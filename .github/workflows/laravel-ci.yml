name: Laravel CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, sqlite, pdo_sqlite, openssl, tokenizer, xml, ctype, json, bcmath, fileinfo
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copiar archivo de entorno
        run: cp .env.example .env

      - name: Generar APP_KEY
        run: php artisan key:generate

      - name: Preparar base SQLite
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Configurar entorno de pruebas
        run: |
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=${{ github.workspace }}/database/database.sqlite" >> .env

      - name: Ejecutar migraciones
        run: php artisan migrate --force

      - name: Instalar dependencias frontend
        run: npm install

      - name: Compilar frontend
        run: npm run build

      - name: Ejecutar pruebas Laravel
        run: php artisan test
